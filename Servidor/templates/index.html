<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoramento do Sensor ESP32</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding-top: 30px; font-family: Arial, sans-serif; }
        .card { box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .table th { background-color: #e9ecef; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card p-4 mb-4">
            <h1 class="text-center mb-4">Painel de Controle IoT - ESP32</h1>
            
            <div class="table-responsive">
                <table class="table table-bordered table-striped text-center align-middle">
                    <thead>
                        <tr>
                            <th>Data e Hora</th>
                            <th>Modo Economia Ativo?</th>
                            <th>Tempo Total Ligado (s)</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for registro in historico %}
                        <tr>
                            <td>{{ registro.data_hora }}</td>
                            <td>
                                <span class="badge {{ 'bg-success' if registro.modo_economia == 'TRUE' else 'bg-danger' }}">
                                    {{ registro.modo_economia }}
                                </span>
                            </td>
                            <td>{{ registro.tempo_ligado }}</td>
                        </tr>
                        {% endfor %}
                        
                        {% if not historico %}
                        <tr>
                            <td colspan="3" class="text-muted">Nenhum sinal recebido do Wokwi ainda...</td>
                        </tr>
                        {% endif %}
                    </tbody>
                </table>
            </div>
            
            <div class="text-center mt-3">
                <button onclick="window.location.reload();" class="btn btn-primary">Atualizar Painel</button>
            </div>
        </div>
    </div>
</body>
</html>
